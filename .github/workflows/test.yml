name: Test

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: Test on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - name: Run tests
        run: go test ./...
      - name: Run vet
        run: go vet ./...
      - name: Smoke test repository action
        id: buildsift
        uses: ./
        with:
          log-path: testdata/maven.log
      - name: Verify action output
        shell: bash
        env:
          BUILDSIFT_JSON: ${{ steps.buildsift.outputs.json }}
        run: |
          printf '%s\n' "$BUILDSIFT_JSON" | grep -F '"schema_version": "1"'
          printf '%s\n' "$BUILDSIFT_JSON" | grep -F '"tool": "maven"'
