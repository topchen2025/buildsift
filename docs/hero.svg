<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title description">
  <title id="title">BuildSift turns noisy build logs into an evidence-backed root cause</title>
  <desc id="description">2026-07-18：使用深色终端对比图直观展示 BuildSift 的根因筛选价值。</desc>
  <defs>
    <linearGradient id="background" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0d1117"/>
      <stop offset="1" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#2f81f7"/>
      <stop offset="1" stop-color="#3fb950"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="18" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
  </defs>

  <rect width="1200" height="630" rx="28" fill="url(#background)"/>
  <rect x="1" y="1" width="1198" height="628" rx="27" fill="none" stroke="#30363d" stroke-width="2"/>

  <g font-family="-apple-system, BlinkMacSystemFont, Segoe UI, Helvetica, Arial, sans-serif">
    <circle cx="58" cy="54" r="14" fill="#2f81f7"/>
    <path d="M51 54h14M58 47v14" stroke="#ffffff" stroke-width="3" stroke-linecap="round"/>
    <text x="82" y="62" fill="#f0f6fc" font-size="27" font-weight="700" letter-spacing="0.3">BuildSift</text>
    <text x="236" y="61" fill="#8b949e" font-size="18">Find the first error that actually matters.</text>

    <g transform="translate(868 39)" font-size="12" font-weight="700" letter-spacing="0.8">
      <rect width="78" height="28" rx="14" fill="#16263d" stroke="#2f81f7"/>
      <text x="39" y="18" fill="#79c0ff" text-anchor="middle">LOCAL</text>
      <rect x="88" width="112" height="28" rx="14" fill="#163324" stroke="#3fb950"/>
      <text x="144" y="18" fill="#7ee787" text-anchor="middle">NO UPLOADS</text>
      <rect x="210" width="72" height="28" rx="14" fill="#2b2338" stroke="#a371f7"/>
      <text x="246" y="18" fill="#d2a8ff" text-anchor="middle">NO AI</text>
    </g>
  </g>

  <g filter="url(#shadow)">
    <rect x="42" y="108" width="500" height="452" rx="16" fill="#0b0f14" stroke="#30363d"/>
    <rect x="42" y="108" width="500" height="48" rx="16" fill="#161b22"/>
    <rect x="42" y="140" width="500" height="16" fill="#161b22"/>
    <circle cx="68" cy="132" r="6" fill="#f85149"/>
    <circle cx="88" cy="132" r="6" fill="#d29922"/>
    <circle cx="108" cy="132" r="6" fill="#3fb950"/>
    <text x="292" y="138" fill="#8b949e" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="13" text-anchor="middle">raw-build.log</text>

    <g font-family="SFMono-Regular, Consolas, Liberation Mono, monospace" font-size="14">
      <text x="66" y="190" fill="#8b949e">[INFO] Scanning for projects...</text>
      <text x="66" y="219" fill="#8b949e">[INFO] Reactor Summary:</text>
      <text x="66" y="248" fill="#c9d1d9">payments-api ............... FAILURE</text>
      <text x="66" y="277" fill="#d29922">payments-service ........... SKIPPED</text>
      <text x="66" y="306" fill="#d29922">payments-web ............... SKIPPED</text>
      <text x="66" y="349" fill="#f85149">[ERROR] Failed to execute goal...</text>
      <text x="66" y="378" fill="#f85149">at org.apache.maven.lifecycle...</text>
      <text x="66" y="407" fill="#f85149">Caused by: java.nio.file...</text>
      <text x="66" y="436" fill="#6e7681">... 2,184 more lines ...</text>
      <text x="66" y="479" fill="#f85149">[ERROR] BUILD FAILURE</text>
      <text x="66" y="508" fill="#8b949e">Re-run Maven with -X for details.</text>
    </g>

    <rect x="64" y="525" width="158" height="23" rx="11.5" fill="#321d20"/>
    <text x="143" y="541" fill="#ff7b72" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="12" font-weight="700" text-anchor="middle">2,184 LINES OF NOISE</text>
  </g>

  <g>
    <path d="M566 320h60" stroke="url(#accent)" stroke-width="5" stroke-linecap="round"/>
    <path d="m615 307 14 13-14 13" fill="none" stroke="#3fb950" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="598" y="292" fill="#8b949e" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="12" font-weight="700" text-anchor="middle" letter-spacing="0.8">SIFT</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="656" y="108" width="502" height="452" rx="16" fill="#0b0f14" stroke="#238636" stroke-width="1.5"/>
    <rect x="656" y="108" width="502" height="48" rx="16" fill="#13201a"/>
    <rect x="656" y="140" width="502" height="16" fill="#13201a"/>
    <circle cx="682" cy="132" r="6" fill="#3fb950"/>
    <text x="907" y="138" fill="#7ee787" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="13" font-weight="600" text-anchor="middle">buildsift diagnosis</text>

    <g font-family="SFMono-Regular, Consolas, Liberation Mono, monospace">
      <text x="682" y="193" fill="#7ee787" font-size="14" font-weight="700">ROOT CAUSE [HIGH · MAVEN]</text>
      <text x="682" y="224" fill="#f0f6fc" font-size="16" font-weight="700">NoSuchFileException:</text>
      <text x="682" y="250" fill="#c9d1d9" font-size="14">~/work/quality/target/pmd.xml</text>

      <text x="682" y="299" fill="#79c0ff" font-size="14" font-weight="700">EVIDENCE</text>
      <rect x="678" y="311" width="450" height="63" rx="8" fill="#111820" stroke="#1f6feb" stroke-opacity="0.55"/>
      <text x="695" y="337" fill="#6eafea" font-size="13">L1842</text>
      <text x="754" y="337" fill="#c9d1d9" font-size="13">NoSuchFileException:</text>
      <text x="754" y="360" fill="#c9d1d9" font-size="13">~/work/quality/target/pmd.xml</text>

      <text x="682" y="421" fill="#d2a8ff" font-size="14" font-weight="700">NEXT CHECK</text>
      <rect x="678" y="435" width="450" height="49" rx="8" fill="#191326" stroke="#8957e5" stroke-opacity="0.65"/>
      <text x="697" y="466" fill="#e6dbff" font-size="14">$ mvn -e -X</text>
    </g>

    <rect x="678" y="513" width="178" height="25" rx="12.5" fill="#163324"/>
    <text x="767" y="530" fill="#7ee787" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="12" font-weight="700" text-anchor="middle">EVIDENCE, NOT A GUESS</text>
  </g>

  <text x="600" y="601" fill="#8b949e" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="14" text-anchor="middle">buildsift -- mvn test  ·  deterministic  ·  local-first  ·  open source</text>
</svg>
